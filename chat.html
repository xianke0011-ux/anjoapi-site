<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjo Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
font-family:Arial,sans-serif;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:20px 30px;
background:#111827;
font-size:28px;
font-weight:bold;
}

.chat-box{
flex:1;
padding:30px;
overflow:auto;
}

.message{
max-width:800px;
margin:20px auto;
padding:20px;
border-radius:20px;
line-height:1.8;
}

.ai{
background:#1e293b;
}

.user{
background:#2563eb;
text-align:right;
}

.input-area{
display:flex;
padding:20px;
background:#111827;
gap:10px;
}

input{
flex:1;
padding:18px;
border:none;
border-radius:14px;
font-size:18px;
outline:none;
}

button{
padding:18px 30px;
border:none;
background:#2563eb;
color:white;
font-size:18px;
border-radius:14px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<header>
Anjo Chat
</header>

<div class="chat-box" id="chatBox">

<div class="message ai">
你好，欢迎使用 Anjo API，请输入你的问题。
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="请输入内容..."
>

<button onclick="sendMessage()">
发送
</button>

</div>

<script>
function sendMessage(){

let input =
document.getElementById("userInput");

let text =
input.value.trim();

if(text==="") return;

let chatBox =
document.getElementById("chatBox");

chatBox.innerHTML += `
<div class="message user">
${text}
</div>
`;

setTimeout(()=>{

chatBox.innerHTML += `
<div class="message ai">
这是演示版聊天页面，后续可以接 OpenAI API。
</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

},500);

input.value="";

chatBox.scrollTop =
chatBox.scrollHeight;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjo Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
header{padding:20px 30px;background:#111827;font-size:28px;font-weight:bold}
.chat-box{flex:1;padding:30px;overflow:auto}
.message{max-width:800px;margin:20px auto;padding:20px;border-radius:18px;line-height:1.7;white-space:pre-wrap}
.ai{background:#1e293b}
.user{background:#2563eb;text-align:right}
.input-area{display:flex;padding:20px;background:#111827;gap:10px}
input{flex:1;padding:16px;border:none;border-radius:12px;font-size:17px;outline:none}
button{padding:16px 28px;border:none;background:#2563eb;color:white;font-size:17px;border-radius:12px;cursor:pointer}
button:hover{background:#1d4ed8}
</style>
</head>
<body>

<header>Anjo Chat</header>

<div class="chat-box" id="chatBox">
  <div class="message ai">你好，我是 Anjo Chat。请输入你的问题。</div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="请输入内容...">
  <button id="sendBtn">发送</button>
</div>

<script>
let supabaseClient = null;

async function init() {
  const res = await fetch("/api/config");
  const cfg = await res.json();

  supabaseClient = window.supabase.createClient(
    cfg.supabaseUrl,
    cfg.supabaseAnonKey
  );

  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.href = "login.html";
  }
}

async function doSend() {
  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");
  const text = input.value.trim();

  if (!text) return;

  const { data } = await supabaseClient.auth.getSession();
  const session = data.session;

  if (!session) {
    window.location.href = "login.html";
    return;
  }

  chatBox.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";
  chatBox.innerHTML += `<div class="message ai" id="loading">正在思考...</div>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ message: text })
  });

  const result = await res.json();
  document.getElementById("loading")?.remove();

  chatBox.innerHTML += `<div class="message ai">${result.reply || "出错了：" + result.error}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById("sendBtn").addEventListener("click", doSend);
document.getElementById("userInput").addEventListener("keydown", function(e){
  if (e.key === "Enter") doSend();
});

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anjo API</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#07152e;
  color:white;
  font-family:Arial,sans-serif;
}

.hero{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

h1{
  font-size:72px;
  margin-bottom:20px;
}

.subtitle{
  font-size:28px;
  color:#d1d5db;
  margin-bottom:40px;
}

.button{
  display:inline-block;
  background:#2563eb;
  color:white;
  text-decoration:none;
  padding:18px 42px;
  border-radius:14px;
  font-size:22px;
  transition:0.2s;
}

.button:hover{
  background:#1d4ed8;
}

.section{
  background:#1e2d47;
  padding:80px 20px;
  display:flex;
  justify-content:center;
}

.card{
  width:100%;
  max-width:900px;
  background:#334155;
  border-radius:24px;
  padding:50px;
  text-align:center;
}

.card h2{
  font-size:42px;
  margin-bottom:24px;
}

.card p{
  font-size:22px;
  color:#e5e7eb;
  line-height:1.8;
}

.footer{
  text-align:center;
  padding:30px;
  color:#94a3b8;
  background:#07152e;
}

@media(max-width:768px){

  h1{
    font-size:48px;
  }

  .subtitle{
    font-size:20px;
  }

  .button{
    font-size:18px;
    padding:16px 30px;
  }

  .card h2{
    font-size:30px;
  }

  .card p{
    font-size:18px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <h1>Anjo API</h1>

  <div class="subtitle">
    稳定的 AI API 中转与智能聊天平台
  </div>

  <a class="button" href="login.html">
    开始使用
  </a>
</section>

<section class="section">
  <div class="card">
    <h2>支持多个模型</h2>

    <p>
      支持 ChatGPT、Claude、Gemini 等 AI 模型接入，
      提供稳定、高速、安全的智能聊天体验。
    </p>
  </div>
</section>

<footer class="footer">
  © 2026 Anjo API
</footer>

</body>
</html>
